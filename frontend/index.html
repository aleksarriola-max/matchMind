<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MatchMind</title>
  <style>
    :root {
      --bg: #0b0b0b;
      --panel: #161616;
      --border: #2a2a2a;
      --text: #eaeaea;
      --muted: #999;
      --accent: #00e0ff;
      --ar: #ffe14d;
      --home: #0B5FA5;
      --away: #C8102E;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .bg-glow { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
    .bg-blob { position: absolute; width: 50vw; height: 50vw; max-width: 600px; max-height: 600px; border-radius: 50%; filter: blur(60px); opacity: 0.35; }
    .bg-blob-gold { background: #ffd14d; top: -10%; left: -10%; animation: drift1 28s ease-in-out infinite; }
    .bg-blob-cyan { background: #00e0ff; top: -15%; right: -10%; animation: drift2 34s ease-in-out infinite; }
    .bg-blob-green { background: #2ecc71; bottom: -20%; left: 30%; animation: drift3 40s ease-in-out infinite; }
    @keyframes drift1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(40px, 30px); } }
    @keyframes drift2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-30px, 40px); } }
    @keyframes drift3 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(30px, -30px); } }
    a { color: var(--accent); }
    header.match-header { padding: 16px 24px; border-bottom: 1px solid var(--border); }
    header.match-header .competition { color: var(--muted); font-size: 0.9em; margin: 0 0 4px; }
    header.match-header h1 { margin: 0; font-size: 1.4em; }
    header.match-header h1 .home { color: var(--home); }
    header.match-header h1 .away { color: var(--away); }
    nav.tabs { display: flex; gap: 4px; padding: 0 24px; border-bottom: 1px solid var(--border); overflow-x: auto; }
    nav.tabs button {
      background: none; border: none; color: var(--muted);
      padding: 12px 18px; font-size: 1em; cursor: pointer;
      border-bottom: 2px solid transparent; white-space: nowrap; flex-shrink: 0;
    }
    nav.tabs button.active { color: var(--text); border-bottom-color: var(--accent); }
    nav.tabs button:hover { color: var(--text); text-shadow: 0 0 8px var(--accent); }
    main { max-width: 960px; margin: 0 auto; padding: 20px 24px 60px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fade-in 0.25s ease-out; }
    @keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .card-hover { transition: transform 0.15s ease-out, box-shadow 0.15s ease-out; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
    .score-bar {
      display: flex; align-items: center; justify-content: space-between;
      border-radius: 6px; padding: 10px 16px; margin-top: 8px;
      box-shadow: 0 0 20px rgba(0,224,255,0.15);
    }
    .score-bar .team-name { font-weight: 700; letter-spacing: 0.3px; text-shadow: 0 1px 4px rgba(0,0,0,0.85), 0 0 1px rgba(0,0,0,0.9); }
    .score-bar .home { color: #fff; }
    .score-bar .away { color: #fff; }
    .score-bar .score { color: #fff; font-weight: 900; font-size: 1.2em; text-shadow: 0 0 12px rgba(0,224,255,0.9), 0 1px 4px rgba(0,0,0,0.85); }
    .glow-bar-label { display: flex; justify-content: space-between; color: var(--muted); font-size: 0.75em; margin-bottom: 4px; }
    .glow-bar { background: #1c1c24; border-radius: 6px; height: 10px; overflow: hidden; }
    .glow-bar .fill { height: 100%; border-radius: 6px; width: 0; transition: width 0.6s ease-out; box-shadow: 0 0 10px currentColor; }
    .momentum-chart-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; margin-bottom: 20px; }
    .momentum-chart-wrap h3 { margin: 0 0 8px; font-size: 0.85em; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .momentum-chart-svg { width: 100%; display: block; }
    .momentum-chart-svg .axis-label { fill: var(--muted); font-size: 9px; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
    .team-cards { display: flex; gap: 16px; margin-bottom: 20px; }
    .team-card { flex: 1; background: var(--panel); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 6px; padding: 12px 16px; }
    .team-card .swatch {
      display: inline-block; width: 12px; height: 12px; border-radius: 50%;
      margin-right: 6px; vertical-align: middle;
    }
    .team-card h3 { margin: 0 0 6px; }
    .event-list { list-style: none; padding: 0; margin: 0; }
    .event-row {
      display: flex; align-items: center; gap: 10px; background: var(--panel);
      border-left: 3px solid var(--accent); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px;
    }
    .event-row .icon { font-size: 1.1em; }
    .event-row .minute { color: var(--accent); min-width: 3em; font-weight: 700; }
    .event-badge {
      display: inline-block; font-size: 0.75em; text-transform: uppercase;
      letter-spacing: 0.05em; background: var(--border); color: var(--muted);
      border-radius: 4px; padding: 2px 6px;
    }
    .error { color: #ff6b6b; padding: 20px; }
    .moments-layout { display: flex; gap: 20px; align-items: flex-start; }
    .moments-sidebar { list-style: none; padding: 0; margin: 0; min-width: 200px; }
    .moments-sidebar li { margin-bottom: 6px; }
    .moments-sidebar button {
      width: 100%; text-align: left; background: var(--panel);
      border: 1px solid var(--border); color: var(--text);
      padding: 10px 12px; border-radius: 4px; cursor: pointer; font-size: 0.95em;
    }
    .moments-sidebar button.active { border-color: var(--accent); color: var(--accent); }
    .moment-detail { flex: 1; min-width: 0; }
    .law-badge {
      display: inline-block; background: var(--border); color: var(--muted);
      border-radius: 4px; padding: 4px 10px; font-size: 0.85em; margin-bottom: 8px;
      transition: box-shadow 0.15s ease-out;
    }
    .law-badge:hover { box-shadow: 0 0 8px rgba(0,224,255,0.4); }
    .confidence-line { color: var(--accent); font-weight: 600; }
    .analytics-table { border-collapse: collapse; margin: 8px 0; }
    .analytics-table th, .analytics-table td {
      border: 1px solid var(--border); padding: 6px 12px; text-align: left;
    }
    .pitch-wrap {
      background: radial-gradient(ellipse at center, #15351f 0%, #0a0a0a 80%);
      border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-top: 12px;
      position: relative; overflow: hidden;
    }
    .pitch-wrap::before, .pitch-wrap::after {
      content: ''; position: absolute; top: 0; width: 70px; height: 30px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.18), transparent 70%);
      pointer-events: none;
    }
    .pitch-wrap::before { left: 0; }
    .pitch-wrap::after { right: 0; }
    .pitch-svg { width: 100%; display: block; position: relative; z-index: 1; }
    .crowd-row {
      height: 8px; background-image: radial-gradient(circle, rgba(200,200,200,0.4) 1px, transparent 1.5px);
      background-size: 6px 6px; opacity: 0.5; position: relative; z-index: 1;
    }
    .lab-banner { display: flex; align-items: center; justify-content: center; gap: 14px; margin: 10px 0; }
    .crest {
      width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; color: #fff; font-weight: 800; font-size: 13px; border: 2px solid #fff;
      flex-shrink: 0;
    }
    .lab-banner .var-label {
      display: flex; align-items: center; gap: 6px; color: #ddd; font-size: 0.75em;
      letter-spacing: 1px; text-transform: uppercase; font-weight: 700;
    }
    .pulse-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #ff3b3b;
      box-shadow: 0 0 6px #ff3b3b; animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .lower-third {
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(90deg, var(--accent), var(--home));
      color: #fff; padding: 6px 12px; border-radius: 4px; margin-top: 8px; font-size: 0.9em;
    }
    .toggle-row { display: flex; gap: 8px; margin-top: 10px; }
    .toggle-row button {
      background: var(--panel); border: 1px solid var(--border); color: var(--text);
      padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85em;
    }
    .toggle-row button.on { border-color: var(--accent); color: var(--accent); }
    .inset-wrap { margin-top: 14px; }
    .inset-svg { width: 100%; display: block; background: #0e2a1a; border-radius: 4px; }
    .callout {
      background: var(--panel); border-left: 3px solid var(--accent);
      padding: 10px 14px; margin: 12px 0; border-radius: 0 6px 6px 0;
    }
    .debate-cols { display: flex; gap: 16px; margin-top: 12px; }
    .debate-cols > div { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
    .debate-cols h4 { margin-top: 0; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 0.8em; font-weight: 600; }
    .badge.verified { background: #1f3d2a; color: #6fd98e; box-shadow: 0 0 8px rgba(111,217,142,0.5); }
    .badge.unverified { background: #3d2a1f; color: #f0a868; box-shadow: 0 0 8px rgba(240,168,104,0.5); }
    .confidence-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; margin: 12px 0;
      transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
    }
    .confidence-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
    .confidence-card .confidence-line { font-size: 1.4em; margin: 0 0 4px; }
    .lineage { font-family: monospace; color: var(--muted); font-size: 0.8em; margin-top: 16px; }
    .history-topics { display: flex; gap: 8px; margin: 12px 0; }
    .history-topics button { text-transform: capitalize; }
    .history-topics button.active { border-color: var(--accent); color: var(--accent); }
    .history-topics button:hover { color: var(--accent); box-shadow: 0 0 8px rgba(0,224,255,0.3); }
    .incident-card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; margin: 12px 0; }
    .incident-card h4 { margin: 0 0 4px; }
    .incident-card .incident-meta { color: var(--muted); font-size: 0.85em; margin-bottom: 8px; }
    .replay-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .replay-minute { font-size: 1.8em; font-weight: 900; }
    .replay-minute .tick { font-size: 0.6em; color: var(--muted); }
    .replay-score { font-size: 1.2em; font-weight: 700; }
    .replay-controls { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; }
    .replay-controls button {
      background: var(--panel); border: 1px solid var(--border); color: var(--text);
      padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 0.9em;
    }
    .speed-btn.on { border-color: var(--accent); color: var(--accent); }
    .replay-controls input[type="range"] { flex: 1; accent-color: var(--accent); }
    .replay-banner {
      background: linear-gradient(90deg, #8a0000, #1a0000); border-radius: 6px; padding: 10px 14px;
      margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 0 16px rgba(255,59,59,0.3);
    }
    .replay-banner .label { color: #fff; font-size: 0.7em; font-weight: 700; letter-spacing: 1px; }
    .replay-banner .title { color: #fff; font-size: 0.95em; font-weight: 600; margin-top: 2px; }
    .replay-banner button {
      background: #fff; color: #8a0000; border: none; border-radius: 4px;
      padding: 6px 12px; font-weight: 700; font-size: 0.8em; cursor: pointer; flex-shrink: 0;
    }
    .replay-ticker-label { color: var(--muted); font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .speak-btn {
      background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--accent);
      cursor: pointer; padding: 2px 8px; margin-left: 8px; font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="bg-glow" aria-hidden="true">
    <div class="bg-blob bg-blob-gold"></div>
    <div class="bg-blob bg-blob-cyan"></div>
    <div class="bg-blob bg-blob-green"></div>
  </div>
  <header class="match-header" id="match-header">
    <p class="competition"></p>
    <h1></h1>
  </header>
  <nav class="tabs">
    <button data-tab="overview" class="active">Overview</button>
    <button data-tab="moments">Moments</button>
    <button data-tab="ask">Ask MatchMind</button>
    <button data-tab="outrage">Debate</button>
    <button data-tab="history">History</button>
    <button data-tab="live-replay">Live Replay</button>
  </nav>
  <main>
    <section id="tab-overview" class="tab-panel active">
      <div class="team-cards" id="team-cards"></div>
      <div class="momentum-chart-wrap" id="momentum-chart"></div>
      <h2>Match events</h2>
      <ul class="event-list" id="overview-events"></ul>
    </section>

    <section id="tab-moments" class="tab-panel">
      <div class="moments-layout">
        <ul class="moments-sidebar" id="moments-sidebar"></ul>
        <div class="moment-detail" id="moment-detail"></div>
      </div>
    </section>

    <section id="tab-ask" class="tab-panel">
      <h2>Ask MatchMind</h2>
      <form id="ask-form">
        <label>
          Question:
          <input type="text" id="question" size="60" value="Why was the goal disallowed for offside in the 27th minute?">
        </label>
        <br>
        <label>
          Persona:
          <select id="persona">
            <option value="beginner">beginner</option>
            <option value="analyst" selected>analyst</option>
            <option value="kid">kid</option>
            <option value="journalist">journalist</option>
            <option value="coach">coach</option>
          </select>
        </label>
        <label>
          Language:
          <select id="language" disabled>
            <option value="English" selected>English</option>
          </select>
        </label>
        <br>
        <button type="submit">Ask</button>
      </form>
      <div id="result"></div>
    </section>

    <section id="tab-outrage" class="tab-panel">
      <h2>Explain My Outrage</h2>
      <form id="outrage-form">
        <label>
          Your take:
          <textarea id="take" rows="3" cols="60">That offside call was robbery, the goal should have stood!</textarea>
        </label>
        <br>
        <button type="submit">Explain my outrage</button>
      </form>
      <div id="outrage-result"></div>
    </section>

    <section id="tab-history" class="tab-panel">
      <h2>Decision Consistency Analyzer</h2>
      <p>Compare today's call with real World Cup history.</p>
      <div class="history-topics" id="history-topics"></div>
      <div id="history-result"></div>
    </section>

    <section id="tab-live-replay" class="tab-panel">
      <h2>Live Replay</h2>
      <div class="replay-header">
        <div class="replay-minute" id="replay-minute">0<span class="tick">'</span></div>
        <div class="replay-score" id="replay-score"></div>
      </div>
      <div class="replay-controls">
        <button id="replay-play-pause">▶ Play</button>
        <button data-speed="1" class="speed-btn on">1x</button>
        <button data-speed="2" class="speed-btn">2x</button>
        <button data-speed="4" class="speed-btn">4x</button>
        <input type="range" id="replay-seek" min="0" max="90" value="0">
        <button id="replay-mute">🔊</button>
      </div>
      <div id="replay-banner"></div>
      <div class="momentum-chart-wrap" id="replay-momentum-chart"></div>
      <div class="replay-ticker-label">Events so far</div>
      <div id="replay-ticker"></div>
    </section>
  </main>

  <script>
    let matchData = null;

    const EVENT_ICONS = { goal: '⚽', var_review: '🚩', tactical: '🔄', substitution: '🔁', pressure: '😓' };
    const TOPIC_ICONS = { offside: '🚩', handball: '✋', 'goal-line': '📏', penalty: '⚖️' };

    function renderGlowBar(label, pct, color) {
      return '<div class="glow-bar-label"><span>' + label + '</span><span style="color:' + color + ';font-weight:700;">' +
        (pct * 100).toFixed(1) + '%</span></div>' +
        '<div class="glow-bar"><div class="fill" data-pct="' + (pct * 100) + '" style="background:' + color + ';color:' + color + '"></div></div>';
    }

    function animateGlowBars(container) {
      container.querySelectorAll('.glow-bar .fill').forEach(function(el) {
        const pct = el.dataset.pct;
        requestAnimationFrame(function() {
          requestAnimationFrame(function() { el.style.width = pct + '%'; });
        });
      });
    }

    let speakingButton = null;

    let currentUtterance = null;

    function speakText(text, button) {
      if (!('speechSynthesis' in window)) return;
      if (button && button === speakingButton) {
        window.speechSynthesis.cancel();
        return;
      }
      const wasSpeaking = window.speechSynthesis.speaking || window.speechSynthesis.pending;
      if (wasSpeaking) {
        window.speechSynthesis.cancel();
      }

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.onstart = function() { setSpeakingButton(button); };
      utterance.onend = function() { setSpeakingButton(null); };
      utterance.onerror = function() { setSpeakingButton(null); };
      currentUtterance = utterance;
      speakingButton = button || null;

      // Speaking immediately after cancel() races with its internal teardown
      // in Chrome and can silently drop the new utterance -- a short delay
      // only when there was something to actually cancel avoids it.
      if (wasSpeaking) {
        setTimeout(function() { window.speechSynthesis.speak(utterance); }, 50);
      } else {
        window.speechSynthesis.speak(utterance);
      }
    }

    const replayUtteranceQueue = [];

    function queueReplayNarration(text) {
      if (!('speechSynthesis' in window)) return;
      // Unlike speakText(), this never cancels what's already speaking --
      // calling speak() while something is in progress queues it instead
      // of interrupting, so back-to-back breaking moments at higher replay
      // speeds finish each sentence rather than cutting each other off.
      const utterance = new SpeechSynthesisUtterance(text);
      replayUtteranceQueue.push(utterance);
      window.speechSynthesis.speak(utterance);
    }

    function setSpeakingButton(button) {
      document.querySelectorAll('.speak-btn').forEach(function(b) { b.textContent = '🔊'; });
      speakingButton = button;
      if (button) button.textContent = '⏹';
    }

    function escapeAttr(text) {
      return text.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    }

    function speakButtonHtml(text) {
      if (!('speechSynthesis' in window)) return '';
      return '<button class="speak-btn" data-text="' + escapeAttr(text) + '">🔊</button>';
    }

    function wireSpeakButtons(container) {
      container.querySelectorAll('.speak-btn').forEach(function(btn) {
        btn.addEventListener('click', function() { speakText(btn.dataset.text, btn); });
      });
    }

    async function init() {
      try {
        const res = await fetch('/api/match');
        if (!res.ok) throw new Error('status ' + res.status);
        matchData = await res.json();
      } catch (err) {
        document.querySelector('main').innerHTML = '<div class="error">Could not load match data — is the backend running?</div>';
        return;
      }
      document.documentElement.style.setProperty('--home', matchData.home.color);
      document.documentElement.style.setProperty('--away', matchData.away.color);
      renderHeader();
      renderOverview();
      buildMomentsSidebar();
      setupTabs();
    }

    function renderHeader() {
      const header = document.getElementById('match-header');
      header.querySelector('.competition').textContent = matchData.competition;
      header.querySelector('h1').innerHTML =
        '<div class="score-bar" style="background:linear-gradient(90deg, ' + matchData.home.color + ', ' + matchData.away.color + ')">' +
        '<span class="team-name home">' + matchData.home.name + '</span>' +
        '<span class="score">' + matchData.score.home + ' – ' + matchData.score.away + '</span>' +
        '<span class="team-name away">' + matchData.away.name + '</span>' +
        '</div>';
    }

    function renderOverview() {
      const teamCards = document.getElementById('team-cards');
      teamCards.innerHTML = [matchData.home, matchData.away].map(function(team) {
        return '<div class="team-card card-hover" style="border-left-color:' + team.color + '">' +
          '<h3><span class="swatch" style="background:' + team.color + '"></span>' + team.name + '</h3>' +
          '<div>' + team.formation_start + ' → ' + team.formation_end + '</div>' +
          '</div>';
      }).join('');

      const eventList = document.getElementById('overview-events');
      eventList.innerHTML = matchData.events.map(function(e) {
        return '<li class="event-row">' +
          '<span class="icon">' + (EVENT_ICONS[e.type] || '•') + '</span>' +
          '<span class="minute">' + e.minute + '\'</span>' +
          '<span class="event-badge">' + e.type + '</span>' +
          '<span>' + e.desc + '</span></li>';
      }).join('');

      renderMomentumChart('momentum-chart');
    }

    function renderMomentumChart(containerId, currentMinute) {
      const container = document.getElementById(containerId);
      const curve = matchData.momentum;
      const maxAbs = Math.max(1, Math.max.apply(null, curve.map(function(p) { return Math.abs(p.value); })));
      const width = 380, height = 130, marginX = 10, baselineY = 65, halfHeight = 50;
      const clipped = currentMinute !== undefined;
      const visibleCurve = clipped ? curve.filter(function(p) { return p.minute <= currentMinute; }) : curve;

      function xPos(minute) { return marginX + (minute / 90) * (width - 2 * marginX); }
      function yPos(value) { return baselineY - (value / maxAbs) * halfHeight; }

      function nearestValue(minute) {
        let best = curve[0];
        curve.forEach(function(p) {
          if (Math.abs(p.minute - minute) < Math.abs(best.minute - minute)) best = p;
        });
        return best.value;
      }

      function pointTitle(minute, value) {
        const team = value > 0 ? matchData.home.name : value < 0 ? matchData.away.name : 'Even';
        return minute + '\' — ' + (value === 0 ? 'Even' : team + ' ahead (' + value.toFixed(1) + ')');
      }

      const points = visibleCurve.map(function(p) { return xPos(p.minute) + ',' + yPos(p.value); }).join(' ');

      const goalMarkers = matchData.events.filter(function(e) {
        return e.type === 'goal' && (!clipped || e.minute <= currentMinute);
      }).map(function(e) {
        const value = nearestValue(e.minute);
        return '<circle cx="' + xPos(e.minute) + '" cy="' + yPos(value) + '" r="3.5" fill="#fff" stroke="#000" stroke-width="0.5"><title>' + pointTitle(e.minute, value) + '</title></circle>';
      }).join('');

      const hoverPoints = visibleCurve.map(function(p) {
        return '<circle cx="' + xPos(p.minute) + '" cy="' + yPos(p.value) + '" r="8" fill="transparent"><title>' + pointTitle(p.minute, p.value) + '</title></circle>';
      }).join('');

      let nowMarker = '';
      if (clipped && visibleCurve.length) {
        const last = visibleCurve[visibleCurve.length - 1];
        nowMarker = '<circle cx="' + xPos(last.minute) + '" cy="' + yPos(last.value) + '" r="4" fill="#fff" style="animation: pulse 1.4s ease-in-out infinite"/>';
      }

      const pathId = 'momentum-path-' + containerId;
      container.innerHTML = '<h3>Momentum</h3>' +
        '<svg viewBox="0 0 ' + width + ' ' + height + '" class="momentum-chart-svg">' +
        '<defs><linearGradient id="momentum-gradient-' + containerId + '" x1="0" y1="0" x2="1" y2="0">' +
        '<stop offset="0%" stop-color="' + matchData.home.color + '"/>' +
        '<stop offset="100%" stop-color="' + matchData.away.color + '"/>' +
        '</linearGradient></defs>' +
        '<line x1="' + marginX + '" y1="' + baselineY + '" x2="' + (width - marginX) + '" y2="' + baselineY + '" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>' +
        '<polyline points="' + points + '" fill="none" stroke="url(#momentum-gradient-' + containerId + ')" stroke-width="2.5" id="' + pathId + '" style="filter:drop-shadow(0 0 4px rgba(0,224,255,0.4))"/>' +
        goalMarkers + hoverPoints + nowMarker +
        '<text x="' + marginX + '" y="' + (height - 4) + '" class="axis-label">0\'</text>' +
        '<text x="' + (width - marginX) + '" y="' + (height - 4) + '" class="axis-label" text-anchor="end">90\'</text>' +
        '</svg>';

      animateMomentumPath(pathId);
    }

    function animateMomentumPath(pathId) {
      const path = document.getElementById(pathId);
      if (!path) return;
      const length = path.getTotalLength();
      path.style.strokeDasharray = length;
      path.style.strokeDashoffset = length;
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          path.style.transition = 'stroke-dashoffset 0.8s ease-out';
          path.style.strokeDashoffset = '0';
        });
      });
    }

    let momentsInitialized = false;

    function setupTabs() {
      document.querySelectorAll('nav.tabs button').forEach(function(btn) {
        btn.addEventListener('click', function() {
          const previousTab = document.querySelector('nav.tabs button.active');
          if (previousTab && previousTab.dataset.tab === 'live-replay' && btn.dataset.tab !== 'live-replay' && replayPlaying) {
            pauseReplay();
          }
          document.querySelectorAll('nav.tabs button').forEach(function(b) { b.classList.remove('active'); });
          document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
          btn.classList.add('active');
          document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
          if (btn.dataset.tab === 'moments' && !momentsInitialized) {
            momentsInitialized = true;
            selectMoment('offside_27');
          }
          if (btn.dataset.tab === 'history' && !historyInitialized) {
            historyInitialized = true;
            initHistoryTab();
          }
          if (btn.dataset.tab === 'live-replay' && !liveReplayInitialized) {
            liveReplayInitialized = true;
            initLiveReplay();
          }
        });
      });
    }

    let historyInitialized = false;
    let liveReplayInitialized = false;

    function initHistoryTab() {
      const topics = ['offside', 'handball', 'goal-line', 'penalty'];
      const container = document.getElementById('history-topics');
      container.innerHTML = topics.map(function(t) {
        return '<button data-topic="' + t + '">' + (TOPIC_ICONS[t] || '') + ' ' + t + '</button>';
      }).join('');
      container.querySelectorAll('button').forEach(function(btn) {
        btn.addEventListener('click', function() {
          container.querySelectorAll('button').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          selectHistoryTopic(btn.dataset.topic);
        });
      });
      container.querySelector('button').classList.add('active');
      selectHistoryTopic(topics[0]);
    }

    async function selectHistoryTopic(topic) {
      const result = document.getElementById('history-result');
      result.innerHTML = '<p>Loading…</p>';
      let data;
      try {
        const res = await fetch('/api/consistency/' + topic);
        if (!res.ok) throw new Error('status ' + res.status);
        data = await res.json();
      } catch (err) {
        result.innerHTML = '<div class="error">Could not load this topic.</div>';
        return;
      }

      let html = '';
      if (data.today) {
        html += '<div class="confidence-card">' +
          renderGlowBar('Today\'s call confidence', data.today.confidence, 'var(--accent)') +
          '<div style="margin-top:6px;">Today\'s call: ' + data.today.decision + '</div>' +
          '</div>';
      } else {
        html += '<p>This match has no ' + topic + ' review to compare against — here\'s the history.</p>';
      }

      html += data.historical_incidents.map(function(incident) {
        const narration = incident.title + '. ' + incident.description + ' ' + incident.decision +
          (incident.comparison_to_today ? ' ' + incident.comparison_to_today : '');
        let card = '<div class="incident-card card-hover">' +
          '<h4>' + incident.title + ' (' + incident.year + ')' + speakButtonHtml(narration) + '</h4>' +
          '<div class="incident-meta">' + incident.match + '</div>' +
          '<p>' + incident.description + '</p>' +
          '<p><strong>Decision:</strong> ' + incident.decision + '</p>';
        if (incident.comparison_to_today) {
          card += '<div class="callout">' + incident.comparison_to_today + '</div>';
        }
        card += '</div>';
        return card;
      }).join('');

      result.innerHTML = html;
      animateGlowBars(result);
      wireSpeakButtons(result);
    }

    const MOMENT_ORDER = ['offside_27', 'handball_38', 'halftime_shift', 'sub_58', 'goal_home_1', 'fatigue_71', 'goal_home_2'];
    const MOMENT_LABELS = {
      offside_27: "27' Offside review",
      handball_38: "38' Handball review",
      halftime_shift: "46' Tactical shift",
      sub_58: "58' Substitution",
      goal_home_1: "63' Goal",
      fatigue_71: "71' Pressing collapse",
      goal_home_2: "84' Goal",
    };

    function buildMomentsSidebar() {
      const sidebar = document.getElementById('moments-sidebar');
      sidebar.innerHTML = MOMENT_ORDER.map(function(id) {
        const event = matchData.events.find(function(e) { return e.id === id; });
        const icon = event ? (EVENT_ICONS[event.type] || '•') : '•';
        return '<li><button data-moment="' + id + '">' + icon + ' ' + MOMENT_LABELS[id] + '</button></li>';
      }).join('');
      sidebar.querySelectorAll('button').forEach(function(btn) {
        btn.addEventListener('click', function() { selectMoment(btn.dataset.moment); });
      });
    }

    const momentCache = {};

    async function selectMoment(id) {
      document.querySelectorAll('#moments-sidebar button').forEach(function(b) {
        b.classList.toggle('active', b.dataset.moment === id);
      });
      const detail = document.getElementById('moment-detail');
      detail.innerHTML = '<p>Loading…</p>';
      if (!momentCache[id]) {
        try {
          const res = await fetch('/api/moment/' + id);
          if (!res.ok) throw new Error('status ' + res.status);
          momentCache[id] = await res.json();
        } catch (err) {
          detail.innerHTML = '<div class="error">Could not load this moment.</div>';
          return;
        }
      }
      renderMomentDetail(id, momentCache[id]);
    }

    function renderMomentDetail(id, moment) {
      const detail = document.getElementById('moment-detail');
      if (moment.pitch) {
        detail.innerHTML = renderDecisionLab(moment);
      } else {
        detail.innerHTML = renderTextMoment(moment);
      }
      animateGlowBars(detail);
      wireSpeakButtons(detail);
    }

    function renderTextMoment(moment) {
      let html = '<h2>' + moment.title + '</h2>';
      if (moment.law) {
        html += '<div class="law-badge">' + moment.law + '</div>';
      }
      html += '<p class="decision">' + moment.decision + speakButtonHtml(moment.decision + '. ' + moment.summary) + '</p>';
      html += renderGlowBar('Confidence', moment.confidence, 'var(--accent)');
      html += '<p>' + moment.summary + '</p>';
      html += '<h3>Evidence</h3><ul>' + moment.evidence.map(function(e) { return '<li>' + e + '</li>'; }).join('') + '</ul>';
      if (moment.analytics) {
        html += renderAnalyticsBlock(moment);
      }
      return html;
    }

    function renderAnalyticsBlock(moment) {
      const a = moment.analytics;
      if (a.handball_reaction) {
        const r = a.handball_reaction.result;
        const benchmark = a.handball_reaction.inputs.reaction_benchmark_ms;
        return '<h3>Computed analytics</h3>' +
          '<p>Ball reaches the point of contact in ' + r.time_available_ms + 'ms — ' +
          r.deficit_ratio + 'x faster than the ' + benchmark + 'ms human reaction benchmark (' + r.verdict + ').</p>';
      }
      if (a.fatigue_index) {
        const home = a.fatigue_index.home;
        const away = a.fatigue_index.away;
        const cmp = a.fatigue_comparison;
        return '<h3>Computed analytics</h3>' +
          '<table class="analytics-table">' +
          '<tr><th>Team</th><th>Trend</th><th>Peak window</th></tr>' +
          '<tr><td>' + matchData.home.name + '</td><td>' + home.trend + '</td><td>' + home.peak_window + '</td></tr>' +
          '<tr><td>' + matchData.away.name + '</td><td>' + away.trend + '</td><td>' + away.peak_window + '</td></tr>' +
          '</table>' +
          '<p>More fatigued by full-time: ' + cmp.more_fatigued_team + ' (diff ' + cmp.difference[5] + ' pts)</p>';
      }
      return '';
    }

    function playerCircle(player, fillColor, strokeColor, strokeWidth) {
      const number = player.label.indexOf('#') >= 0 ? player.label.split('#')[1] : player.label;
      return '<circle cx="' + player.x + '" cy="' + player.y + '" r="1.6" fill="' + fillColor + '" stroke="' + strokeColor + '" stroke-width="' + strokeWidth + '"/>' +
        '<text x="' + player.x + '" y="' + (player.y + 0.7) + '" fill="#fff" font-size="1.8" text-anchor="middle">' + number + '</text>';
    }

    let showSightline = false;
    let showUncertaintyBand = true;

    function toggleSightline() {
      showSightline = !showSightline;
      renderMomentDetail('offside_27', momentCache['offside_27']);
    }

    function toggleUncertaintyBand() {
      showUncertaintyBand = !showUncertaintyBand;
      renderMomentDetail('offside_27', momentCache['offside_27']);
    }

    function renderDecisionLab(moment) {
      const p = moment.pitch;
      const homeColor = matchData.home.color;
      const awayColor = matchData.away.color;
      const lineX = p.offside_line_x;

      let html = '<h2>' + moment.title + '</h2>';
      if (moment.law) {
        html += '<div class="law-badge">' + moment.law + '</div>';
      }
      html += '<p class="decision">' + moment.decision + speakButtonHtml(moment.decision + '. ' + moment.summary) + '</p>';

      html += '<div class="lab-banner">' +
        '<div class="crest" style="background:' + homeColor + '">' + matchData.home.name[0] + '</div>' +
        '<span class="var-label"><span class="pulse-dot"></span>VAR Review</span>' +
        '<div class="crest" style="background:' + awayColor + '">' + matchData.away.name[0] + '</div>' +
        '</div>';

      html += '<div class="pitch-wrap"><div class="crowd-row"></div><svg viewBox="-2 -2 104 72" class="pitch-svg">';

      html += '<rect x="-2" y="-2" width="104" height="72" fill="#1a6e38"/>';
      html += '<g opacity="0.18" fill="#ffffff">';
      [-2, 18, 38, 58, 78, 98].forEach(function(x) {
        html += '<rect x="' + x + '" y="-2" width="10" height="72"/>';
      });
      html += '</g>';

      html += '<g stroke="#eaf5ee" stroke-width="0.35" fill="none" opacity="0.9">';
      html += '<rect x="0" y="0" width="100" height="68"/>';
      html += '<line x1="50" y1="0" x2="50" y2="68"/>';
      html += '<circle cx="50" cy="34" r="8.7"/>';
      html += '<circle cx="50" cy="34" r="0.5" fill="#eaf5ee"/>';
      html += '<rect x="84.3" y="13.8" width="15.7" height="40.3"/>';
      html += '<rect x="94.8" y="24.8" width="5.2" height="18.3"/>';
      html += '<circle cx="89.5" cy="34" r="0.5" fill="#eaf5ee"/>';
      html += '<path d="M 84.3 26.7 A 8.7 8.7 0 0 1 84.3 41.3"/>';
      html += '<rect x="100" y="30.3" width="1.6" height="7.3" fill="#eaf5ee" opacity="0.5"/>';
      html += '<rect x="0" y="13.8" width="15.7" height="40.3"/>';
      html += '<rect x="0" y="24.8" width="5.2" height="18.3"/>';
      html += '<path d="M 0 1 A 1 1 0 0 1 1 0"/>';
      html += '<path d="M 100 1 A 1 1 0 0 0 99 0"/>';
      html += '<path d="M 0 67 A 1 1 0 0 0 1 68"/>';
      html += '<path d="M 100 67 A 1 1 0 0 1 99 68"/>';
      html += '</g>';

      html += '<line x1="' + lineX + '" y1="-2" x2="' + lineX + '" y2="70" stroke="#00e0ff" stroke-width="0.5"/>';
      html += '<line x1="' + lineX + '" y1="-2" x2="' + lineX + '" y2="70" stroke="#00e0ff" stroke-width="1.6" opacity="0.25"/>';

      if (showSightline) {
        const ar = p.assistant_referee;
        html += '<line x1="' + ar.x + '" y1="' + (ar.y + 0.5) + '" x2="' + p.attacker.x + '" y2="' + p.attacker.y + '" stroke="#ffe14d" stroke-width="0.25" stroke-dasharray="0.8,0.6" opacity="0.85"/>';
        html += '<line x1="' + ar.x + '" y1="' + (ar.y + 0.5) + '" x2="' + p.second_last_defender.x + '" y2="' + p.second_last_defender.y + '" stroke="#ffe14d" stroke-width="0.25" stroke-dasharray="0.8,0.6" opacity="0.5"/>';
      }

      p.others.forEach(function(o) {

        html += '<circle cx="' + o.x + '" cy="' + o.y + '" r="1.5" fill="' + color + '" stroke="#ffffff" stroke-width="0.2" opacity="0.65"/>';
      });

      html += '<circle cx="' + p.ball.x + '" cy="' + p.ball.y + '" r="0.9" fill="#fff" stroke="#333" stroke-width="0.15"/>';

      html += playerCircle(p.passer, homeColor, '#ffffff', 0.25);
      html += playerCircle(p.second_last_defender, awayColor, '#ffffff', 0.25);
      html += playerCircle(p.attacker, homeColor, '#ff4d4d', 0.4);
      html += playerCircle(p.keeper, awayColor, '#ffffff', 0.25);

      html += '<circle cx="' + p.assistant_referee.x + '" cy="' + (p.assistant_referee.y + 0.3) + '" r="1" fill="#ffe14d"/>';
      html += '<text x="' + p.assistant_referee.x + '" y="' + (p.assistant_referee.y - 0.6) + '" fill="#ffe14d" font-size="2" text-anchor="middle">' + p.assistant_referee.label + '</text>';

      html += '</svg><div class="crowd-row"></div></div>';

      const probability = moment.analytics.offside_probability.result.probability;
      html += '<div class="lower-third">' +
        '<strong>OFFSIDE — ' + p.attacker.label.toUpperCase() + '</strong>' +
        '<span>Margin: ' + moment.margin_cm.toFixed(1) + ' cm &nbsp;|&nbsp; Confidence: ' + (probability * 100).toFixed(1) + '%</span>' +
        '</div>';

      html += '<div class="toggle-row">' +
        '<button onclick="toggleSightline()" class="' + (showSightline ? 'on' : '') + '">Referee sightline</button>' +
        '<button onclick="toggleUncertaintyBand()" class="' + (showUncertaintyBand ? 'on' : '') + '">Uncertainty band</button>' +
        '</div>';

      const inputs = moment.analytics.offside_probability.inputs;
      const sigmaFrame = inputs.camera_frame_uncertainty_cm / 1.96;
      const sigmaTotal = Math.sqrt(sigmaFrame * sigmaFrame + inputs.sigma_line_cm * inputs.sigma_line_cm);
      const ciHalfWidth = 1.96 * sigmaTotal;
      const margin = moment.margin_cm;

      html += '<line x1="40" y1="20" x2="' + attackerX + '" y2="20" stroke="' + homeColor + '" stroke-width="1"/>';
      html += '<circle cx="' + attackerX + '" cy="20" r="2.5" fill="' + homeColor + '" stroke="#ff4d4d" stroke-width="0.8"/>';
      html += '<text x="' + (attackerX + 10) + '" y="23" fill="' + homeColor + '" font-size="6" text-anchor="start">#' + attackerNum + ' (+' + margin + 'cm)</text>';
      html += '<line x1="110" y1="30" x2="' + attackerX + '" y2="30" stroke="#fff" stroke-width="0.6"/>';
      html += '<text x="' + ((110 + attackerX) / 2) + '" y="29" fill="#fff" font-size="5" text-anchor="middle">' + margin + 'cm</text>';
      html += '</svg></div>';

      html += '<p class="confidence-line">Confidence: ' + (moment.confidence * 100).toFixed(1) + '% (z = ' + moment.analytics.offside_probability.result.z + ')</p>';

      if (moment.counterfactual) {
        const frames = moment.analytics.counterfactual_timing.result.frames_at_50fps;
        html += '<div class="callout">' + moment.counterfactual + ' (' + frames + ' frames at 50fps — not detectable on broadcast)</div>';
      }

      if (moment.debate) {
        html += '<div class="debate-cols">' +
          '<div><h4>Stands</h4><p>' + moment.debate.stands + '</p></div>' +
          '<div><h4>Overturn</h4><p>' + moment.debate.overturn + '</p></div>' +
          '</div>';
      }

      return html;
    }

    document.getElementById('ask-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const question = document.getElementById('question').value;
      const persona = document.getElementById('persona').value;
      const language = document.getElementById('language').value;

      const result = document.getElementById('result');
      result.innerHTML = '<p>Loading…</p>';

      let data;
      try {
        const response = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, persona, language }),
        });
        if (!response.ok) throw new Error('status ' + response.status);
        data = await response.json();
      } catch (err) {
        result.innerHTML = '<div class="error">Could not get an answer — is the backend running?</div>';
        return;
      }

      const ex = data.explainability;
      const v = data.verification;

        html += '<span class="badge verified">Verified</span> ';

        html += '<span class="badge unverified">Unverified</span> ';
      }

        html += '<ul>' + v.unsupported.map(function(s) { return '<li>' + s + '</li>'; }).join('') + '</ul>';
      }

      html += '<div class="confidence-card">' +
        renderGlowBar('Confidence', ex.confidence, 'var(--accent)') +
        '<div style="margin-top:6px;">' + ex.confidence_basis + '</div>' +
        '</div>';

      html += '<h3>Sources</h3>' + ex.sources.map(function(s) {
        return '<div class="event-row"><span>' + s.title + ' (' + s.source + ', score ' + s.score.toFixed(2) + ')</span></div>';
      }).join('');

      html += '<h3>Evidence</h3>' + ex.evidence.map(function(e) {
        return '<div class="event-row"><span>' + e + '</span></div>';

        html += '<div class="callout">' + ex.counterfactual + '</div>';

      result.innerHTML = html;
      animateGlowBars(result);
      wireSpeakButtons(result);
    });

    let replayMinute = 0;
    let replayPlaying = false;
    let replaySpeed = 1;
    let replayIntervalId = null;
    let replayLastTriggeredEventId = null;
    let replayBannerEventId = null;
    let replayNarrationEnabled = true;

    function initLiveReplay() {
      document.getElementById('replay-play-pause').addEventListener('click', toggleReplayPlayback);
      document.querySelectorAll('.speed-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          replaySpeed = parseInt(btn.dataset.speed, 10);
          document.querySelectorAll('.speed-btn').forEach(function(b) { b.classList.toggle('on', b === btn); });
          if (replayPlaying) {
            clearInterval(replayIntervalId);
            replayIntervalId = setInterval(replayTick, 1000 / replaySpeed);
          }
        });
      });
      document.getElementById('replay-seek').addEventListener('input', function(event) {
        pauseReplay();
        replayMinute = parseInt(event.target.value, 10);
        replayLastTriggeredEventId = lastEventIdAtOrBefore(replayMinute);
        replayBannerEventId = null;
        document.getElementById('replay-banner').innerHTML = '';
        renderReplayState();
      });
      document.getElementById('replay-mute').addEventListener('click', function() {
        replayNarrationEnabled = !replayNarrationEnabled;
        this.textContent = replayNarrationEnabled ? '🔊' : '🔇';
        if (!replayNarrationEnabled && 'speechSynthesis' in window) {
          window.speechSynthesis.cancel();
        }
      });
      renderReplayState();
    }

    function lastEventIdAtOrBefore(minute) {
      let lastId = null;
      matchData.events.forEach(function(e) {
        if (e.id && e.minute <= minute) lastId = e.id;
      });
      return lastId;
    }

    function toggleReplayPlayback() {
      if (replayPlaying) {
        pauseReplay();
      } else {
        startReplay();
      }
    }

    function startReplay() {
      if (replayMinute >= 90) {
        replayMinute = 0;
        replayLastTriggeredEventId = null;
        replayBannerEventId = null;
        document.getElementById('replay-ticker').innerHTML = '';
        document.getElementById('replay-banner').innerHTML = '';
      }
      replayPlaying = true;
      document.getElementById('replay-play-pause').textContent = '⏸ Pause';
      replayIntervalId = setInterval(replayTick, 1000 / replaySpeed);
    }

    function pauseReplay() {
      replayPlaying = false;
      clearInterval(replayIntervalId);
      document.getElementById('replay-play-pause').textContent = replayMinute >= 90 ? '↻ Replay Again' : '▶ Play';
    }

    function replayTick() {
      replayMinute += 1;
      if (replayMinute >= 90) {
        replayMinute = 90;
        pauseReplay();
        renderReplayState();
        return;
      }
      renderReplayState();
    }

    function renderReplayState() {
      document.getElementById('replay-seek').value = replayMinute;
      document.getElementById('replay-minute').innerHTML =
        replayMinute >= 90 ? 'Full Time' : replayMinute + '<span class="tick">\'</span>';

      let homeGoals = 0, awayGoals = 0;
      matchData.events.forEach(function(e) {
        if (e.type === 'goal' && e.minute <= replayMinute) {
          if (e.team === 'home') homeGoals++; else awayGoals++;
        }
      });
      document.getElementById('replay-score').textContent =
        matchData.home.name + ' ' + homeGoals + ' – ' + awayGoals + ' ' + matchData.away.name;

      renderMomentumChart('replay-momentum-chart', replayMinute);

      const ticker = document.getElementById('replay-ticker');
      const pastEvents = matchData.events.filter(function(e) { return e.minute <= replayMinute; }).slice().reverse();
      ticker.innerHTML = pastEvents.map(function(e) {
        return '<div class="event-row">' +
          '<span class="icon">' + (EVENT_ICONS[e.type] || '•') + '</span>' +
          '<span class="minute">' + e.minute + '\'</span>' +
          '<span class="event-badge">' + e.type + '</span>' +
          '<span>' + e.desc + '</span></div>';
      }).join('');

      checkReplayBanner();
    }

    function checkReplayBanner() {
      let candidate = null;
      matchData.events.forEach(function(e) {
        if (e.id && e.minute <= replayMinute && e.id !== replayLastTriggeredEventId) {
          candidate = e;
        }
      });
      if (!candidate) return;
      replayLastTriggeredEventId = candidate.id;
      replayBannerEventId = candidate.id;

      const banner = document.getElementById('replay-banner');
      banner.innerHTML = '<div class="replay-banner">' +
        '<div><div class="label">🔴 BREAKING — ' + candidate.type.toUpperCase().replace('_', ' ') + '</div>' +
        '<div class="title">' + candidate.desc + '</div></div>' +
        '<button onclick="viewMomentFromReplay(\'' + candidate.id + '\')">View full explanation →</button>' +
        '</div>';

      if (replayNarrationEnabled) {
        queueReplayNarration(candidate.desc);
      }

      setTimeout(function() {
        if (replayBannerEventId === candidate.id) {
          banner.innerHTML = '';
        }
      }, 5000);
    }

    function viewMomentFromReplay(momentId) {
      pauseReplay();
      document.querySelectorAll('nav.tabs button').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === 'moments'); });
      document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.toggle('active', p.id === 'tab-moments'); });
      momentsInitialized = true;
      selectMoment(momentId);
    }

    init();
  </script>
</body>
</html>
